<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Leaflet.awesome-markers/2.0.2/leaflet.awesome-markers.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://netdna.bootstrapcdn.com/bootstrap/3.0.0/css/bootstrap-glyphicons.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.2.0/css/all.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/Leaflet.awesome-markers/2.0.2/leaflet.awesome-markers.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/python-visualization/folium/folium/templates/leaflet.awesome.rotate.min.css"/>
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
        #map_canopy_heatmap {
            position: relative;
            width: 100.0%;
            height: 100.0%;
            left: 0.0%;
            top: 0.0%;
        }
        .leaflet-container { font-size: 1rem; }
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/gh/python-visualization/folium@main/folium/templates/leaflet_heat.min.js"></script>
</head>
<body>
    <div class="folium-map" id="map_canopy_heatmap"></div>
</body>
<script>
    var map_canopy_heatmap = L.map(
        "map_canopy_heatmap",
        {
            center: [51.5173, -0.0743],
            crs: L.CRS.EPSG3857,
            zoom: 19,
            zoomControl: true,
            preferCanvas: false,
        }
    );

    var tile_layer_base = L.tileLayer(
        "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
        {
            "minZoom": 0,
            "maxZoom": 19,
            "maxNativeZoom": 19,
            "noWrap": false,
            "attribution": "&copy; <a href=\"https://www.openstreetmap.org/copyright\">OpenStreetMap</a> contributors",
            "opacity": 1,
        }
    ).addTo(map_canopy_heatmap);

    // List of Optimal Pit Coordinates
    var pits = [
        [51.517006, -0.074228], [51.517072, -0.07425], [51.517101, -0.074261], 
        [51.517132, -0.074273], [51.517175, -0.07429], [51.517295, -0.074322], 
        [51.517256, -0.074308], [51.517213, -0.074295], [51.517303, -0.074206], 
        [51.517337, -0.074213], [51.517382, -0.074347], [51.517342, -0.074337], 
        [51.517403, -0.074231], [51.517428, -0.074362], [51.517473, -0.074376], 
        [51.51752, -0.074391], [51.517561, -0.074405], [51.517639, -0.074429], 
        [51.517682, -0.074446], [51.517768, -0.074465], [51.517843, -0.074488], 
        [51.517914, -0.074508], [51.518325, -0.074579], [51.518402, -0.074522], 
        [51.518332, -0.074438], [51.517922, -0.074393], [51.517823, -0.074362], 
        [51.517768, -0.07435], [51.517716, -0.074336], [51.517657, -0.074318], 
        [51.517564, -0.074287], [51.517493, -0.074265], [51.517465, -0.074257], 
        [51.517436, -0.074244], [51.517369, -0.074222], [51.51727, -0.074196], 
        [51.517204, -0.074174], [51.517063, -0.074126], [51.516838, -0.074269], 
        [51.516931, -0.074249], [51.516941, -0.074052], [51.517004, -0.074107], 
        [51.518055, -0.07455], [51.517964, -0.074522], [51.517602, -0.074422]
    ];

    // Add Individual Markers
    pits.forEach(function(coord, index) {
        L.circleMarker(coord, {
            "bubblingMouseEvents": true, 
            "color": "#10B981", 
            "fill": true, 
            "fillColor": "#10B981", 
            "fillOpacity": 1, 
            "radius": 6, 
            "stroke": true, 
            "weight": 3
        }).addTo(map_canopy_heatmap)
          .bindTooltip("Surveyed Tree Pit Location #" + (index + 1), { sticky: true });
    });

    // Add Heat Layer (Projected Canopy Density)
    var heat_data = pits.map(function(p) { return [p[0], p[1], 0.8]; });
    var heat_layer = L.heatLayer(heat_data, {
        "minOpacity": 0.3,
        "maxZoom": 18,
        "radius": 25,
        "blur": 15
    }).addTo(map_canopy_heatmap);

</script>
</html>
